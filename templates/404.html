<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Page Not Found | AVS Portfolio</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
    .err-code { font-family:var(--font-display); font-size:8rem; font-weight:900; color:var(--red); text-shadow:var(--glow); line-height:1; }
    .err-msg { font-family:var(--font-display); font-size:1.5rem; color:var(--white); margin:1rem 0; letter-spacing:3px; }
    .err-sub { color:var(--gray); margin-bottom:2rem; }
  </style>
</head>
<body>
  <div>
    <div style="font-size:5rem;margin-bottom:1rem">🕷️</div>
    <div class="err-code">404</div>
    <div class="err-msg">Page Not Found</div>
    <p class="err-sub">Looks like this web swung somewhere else.</p>
    <a href="/" class="btn-primary">← Back to Home</a>
  </div>
</body>
</html>
