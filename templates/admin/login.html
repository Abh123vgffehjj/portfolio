{% extends "admin/base.html" %}

{% block auth_content %}
<div class="admin-login-page">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(225,29,46,0.1),transparent 70%)" aria-hidden="true"></div>

  <div class="login-box">
    <div class="login-logo">
      <span class="spider">🕷️</span>
      <div class="login-title">AVS<span>.</span>ADMIN</div>
      <div style="color:var(--gray);font-size:0.8rem;margin-top:0.3rem;letter-spacing:2px">SECURE ACCESS</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=True) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'error' if category == 'error' else 'success' }}">
            <i class="fas fa-{{ 'times-circle' if category == 'error' else 'check-circle' }}"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/admin/login" autocomplete="on">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="admin" required autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div style="position:relative">
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password" style="padding-right:3rem">
          <button type="button" onclick="togglePwd()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray);cursor:pointer" aria-label="Toggle password visibility">
            <i class="fas fa-eye" id="pwd-icon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-2" style="padding:0.75rem;font-size:1rem;letter-spacing:2px;text-transform:uppercase">
        <i class="fas fa-sign-in-alt"></i> LOGIN
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem">
      <a href="/" style="color:var(--gray);font-size:0.85rem;text-decoration:none">← Back to Portfolio</a>
    </div>
  </div>
</div>

<script>
function togglePwd() {
  const pwd = document.getElementById('password');
  const icon = document.getElementById('pwd-icon');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    pwd.type = 'password';
    icon.className = 'fas fa-eye';
  }
}
</script>
{% endblock %}
