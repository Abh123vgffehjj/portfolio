{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if item else 'Add' }} Project{% endblock %}
{% block page_title %}{{ 'Edit' if item else 'Add' }} Project{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="admin-table-wrap">
      <div class="admin-table-header">
        <span class="admin-table-title">{{ 'Edit' if item else 'New' }} Project</span>
        <a href="/admin/projects" class="btn btn-sm btn-outline">← Back</a>
      </div>
      <div style="padding:1.5rem">
        <form method="POST" class="admin-form" style="border:none;padding:0">
          <div class="row g-3">
            <div class="col-12">
              <div class="form-group">
                <label>Project Title *</label>
                <input type="text" name="title" class="form-control" required value="{{ item.title if item else '' }}" placeholder="Mine Safety Smart Helmet">
              </div>
            </div>
            <div class="col-12">
              <div class="form-group">
                <label>Description *</label>
                <textarea name="description" class="form-control" required rows="4" placeholder="Describe what the project does and why it matters...">{{ item.description if item else '' }}</textarea>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label>Technologies (comma-separated)</label>
                <input type="text" name="technologies" class="form-control" value="{{ item.technologies if item else '' }}" placeholder="ESP32, Python, Flask, MongoDB">
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label>Category</label>
                <select name="category" class="form-control">
                  <option value="">Select category</option>
                  {% for cat in ['IoT', 'AI/ML', 'Web', 'Mobile', 'Software', 'Data Analytics', 'Embedded'] %}
                  <option value="{{ cat }}" {{ 'selected' if item and item.category == cat else '' }}>{{ cat }}</option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="col-12">
              <div class="form-group">
                <label>Features (one per line)</label>
                <textarea name="features" class="form-control" rows="5" placeholder="Real-time monitoring&#10;Fall detection&#10;Safety alerts">{{ item.features if item else '' }}</textarea>
              </div>
            </div>
            <div class="col-12">
              <div class="form-group">
                <label>Achievement / Award</label>
                <input type="text" name="achievement" class="form-control" value="{{ item.achievement if item else '' }}" placeholder="Presented at IIT Madras">
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label>GitHub URL</label>
                <input type="url" name="github_url" class="form-control" value="{{ item.github_url if item else '' }}" placeholder="https://github.com/...">
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label>Live Demo URL</label>
                <input type="url" name="live_url" class="form-control" value="{{ item.live_url if item else '' }}" placeholder="https://demo.example.com">
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label>Display Order</label>
                <input type="number" name="display_order" class="form-control" value="{{ item.display_order if item else '0' }}" min="0">
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group" style="padding-top:1.5rem">
                <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer">
                  <input type="checkbox" name="is_featured" value="1" {{ 'checked' if item and item.is_featured else '' }} style="width:18px;height:18px;accent-color:var(--red)">
                  <span>Featured project</span>
                </label>
              </div>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> {{ 'Update' if item else 'Create' }} Project
              </button>
              <a href="/admin/projects" class="btn btn-outline ms-2">Cancel</a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
